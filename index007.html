<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        /* 针对调节条的宽度控制 */
        #blurRange, #bgOpacityRange { width: 80px; min-width: 60px; margin: 0 5px; cursor: pointer; }
        .style-control-group { display: flex; align-items: center; white-space: nowrap; font-size: 14px; }
        #bg-layer { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background-color: #fdf6e3; background-size: cover; background-position: center; z-index: -1; transition: 0.5s; }
        body { margin: 0; padding: 20px 8px; display: flex; justify-content: center; align-items: center; min-height: 100vh; font-family: "PingFang SC", "Microsoft YaHei", sans-serif; box-sizing: border-box; }
        .calendar-box { background: white; width: calc(100vw - 16px); max-width: 1000px; padding: 12px 8px; border-radius: 12px; box-shadow: 0 5px 20px rgba(0,0,0,0.05); position: relative; box-sizing: border-box; overflow: hidden; display: flex; flex-direction: column; }
        .has-bg .calendar-box { background: rgba(255, 255, 255, 0.6); backdrop-filter: blur(4px); -webkit-backdrop-filter: blur(4px); }
        .has-bg #calendarNameDisplay {text-shadow: 0 1px 4px rgba(255,255,255,0.8);}
        .has-bg .cell, .has-bg .empty-cell { background: rgba(255, 255, 255, 0.2) !important; border-color: rgba(238, 238, 238, 0.6) !important; }
        .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; padding: 0 15px; }
        .title { font-size: 16px; color: #4a5568; font-weight: bold; cursor: pointer; border-bottom: 1px dashed #cbd5e0; }
        .btn { cursor: pointer; border: none; background: #f0f2f5; width: 28px; height: 28px; border-radius: 50%; display: flex; align-items: center; justify-content: center; }
        .week-header { display: grid; grid-template-columns: repeat(7, 1fr); text-align: center; color: #a0aec0; font-size: 10px; margin-bottom: 5px; }
        .date-grid { display: grid; grid-template-columns: repeat(7, 1fr); grid-auto-rows: 90px; border: 1px solid #eee; width: 100%; }
        .cell, .empty-cell { background: white; padding: 2px; border-right: 1px solid #eee; border-bottom: 1px solid #eee; box-sizing: border-box; }
        .cell { cursor: pointer; position: relative; }
        .date-row { display: flex; align-items: baseline; gap: 3px; height: 18px; pointer-events: none; }
        .s { font-size: 14px; color: #2d3748; font-weight: bold; }
        .l { font-size: 9px; color: #a0aec0; transform: scale(0.85); transform-origin: left; }
        #event-layer { position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; display: grid; grid-template-columns: repeat(7, 1fr); grid-auto-rows: 90px; }
        .event-bar { position: relative; opacity: 0.8; font-size: 11px; padding: 2px 4px; border-radius: 4px; z-index: 10; pointer-events: auto; cursor: pointer; display: flex !important; flex-direction: column; overflow: hidden; box-sizing: border-box; line-height: 1.1; }
        #yearView { display: none; padding: 5px; grid-template-columns: repeat(3, 1fr); gap: 10px; width: 100%; box-sizing: border-box; }
        .year-month-card { border: 1px solid #eee; border-radius: 8px; padding: 8px; cursor: pointer; background: white; }
        .ym-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 1px; margin-top: 4px; }
        .ym-day { font-size: 8px; text-align: center; height: 12px; color: #718096; position: relative; }
        .dot-mark { width: 2px; height: 2px; background: #4fd1c5; border-radius: 50%; position: absolute; bottom: 0; left: 50%; transform: translateX(-50%); }
        #modal-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.3); z-index: 999; display: none; }
        #editor-modal { display: none; position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); background: white; padding: 12px; border-radius: 12px; z-index: 1000; width: 92%; max-width: 420px; box-sizing: border-box; }
        .tool-group { display: flex; align-items: center; gap: 3px; margin-bottom: 8px; flex-wrap: nowrap; overflow-x: auto; }
        .tool-btn { background: #f8fafc; border: 1px solid #e2e8f0; min-width: 28px; height: 26px; border-radius: 4px; cursor: pointer; font-size: 11px; display: flex; align-items: center; justify-content: center; }
        .dot { width: 14px; height: 14px; border-radius: 50%; border: 1px solid rgba(0,0,0,0.05); cursor: pointer; }
        #editor-field { width: 100%; min-height: 120px; max-height: 300px; border: 1px solid #e2e8f0; border-radius: 8px; padding: 10px; margin: 45px 0 8px 0; outline: none; overflow-y: auto; display: flex; flex-direction: column; background: #fff; box-sizing: border-box; }
        .selected { background-color: #ebf8ff !important; border: 1px solid #4299e1 !important; }
        .data-btn { font-size: 10px; color: #94a3b8; background: #f8fafc; border: 1px solid #e2e8f0; border-radius: 4px; padding: 2px 4px; cursor: pointer; margin-right: 2px; }
        .logo-upload-btn { background: #f8fafc; border: 2px dashed #e2e8f0; color: #94a3b8; border-radius: 8px; padding: 10px; cursor: pointer; text-align: center; font-size: 11px; transition: all 0.2s; display: flex; flex-direction: column; align-items: center; gap: 4px; width: 100%; box-sizing: border-box; }
        .logo-upload-btn:hover { border-color: #cbd5e0; color: #64748b; background: #f1f5f9; }
        .logo-preview-img { height: 32px; width: auto; display: none; margin-bottom: 4px; border-radius: 4px; }
        .calendar-container div, [id^="cell-"] { cursor: default !important; }
    </style>
</head>

    <script>
        const S_URL = "https://cnbarxcyhtuyympqwspb.supabase.co";
        const S_KEY = "sb_publishable_8lKRoBeyMpq8UEYugqvn7g_3_iImIur";
        const _db = supabase.createClient(S_URL, S_KEY);

        let currentDate = new Date(), viewMode = 'month', selection = [], currentBarColor = '#B2F2BB', editingId = null, events = [];
        let uc = 0; 
        
        const checkAuth = () => {
            try {
                const auth = localStorage.getItem('admin_auth_data');
                if (!auth) return false;
                const data = JSON.parse(auth);
                if (Date.now() - data.loginTime < 86400000) return true;
                localStorage.removeItem('admin_auth_data'); 
                return false;
            } catch (e) { return false; }
        };

        let isAdmin = checkAuth();
        const trigger = document.getElementById('adminTrigger');
        if (trigger) {
            trigger.onclick = () => {
                if (++uc >= 5) {
                    const pass = prompt("管理员验证码（24h有效）：");
                    if (pass === "5323888") {
                        localStorage.setItem('admin_auth_data', JSON.stringify({
                            is_admin: true, loginTime: Date.now()
                        }));
                        alert("解锁成功，有效期24小时 ⏳");
                        location.reload(); 
                    } else { alert("验证码错误"); }
                    uc = 0;
                }
            };
        }

        // --- 背景和样式 ---
        function updateBlur(val) {
            const bg = document.getElementById('bg-layer');
            if(bg) bg.style.filter = `blur(${val}px)`;
            const blVal = document.getElementById('blVal');
            if(blVal) blVal.innerText = val;
            saveMonthStyle('blur', val);
        }

        function updateBgOpacity(val) {
            const bg = document.getElementById('bg-layer');
            if(bg) bg.style.opacity = val;
            const opVal = document.getElementById('opVal');
            if(opVal) opVal.innerText = val;
            saveMonthStyle('opacity', val);
        }

        async function saveMonthStyle(key, val) {
            const y = currentDate.getFullYear(), m = currentDate.getMonth();
            const monthKey = `${y}-${m}`;
            const configId = `style_${monthKey}`;

            if(key === 'blur') document.documentElement.style.setProperty('--blur', val + 'px');
            if(key === 'opacity') document.documentElement.style.setProperty('--bg-opacity', val);

            let styles = JSON.parse(localStorage.getItem('monthStyles') || '{}');
            if (!styles[monthKey]) styles[monthKey] = {};
            styles[monthKey][key] = val;
            localStorage.setItem('monthStyles', JSON.stringify(styles));
            if (isAdmin) {
                try {
                    await _db.from('configs').upsert([{ id: configId, value: JSON.stringify(styles[monthKey]) }]);
                } catch (e) { console.error("云端保存失败:", e); }
            }
        }

        async function syncData() {
            const y = currentDate.getFullYear();
            const m = currentDate.getMonth();
            try {
                let query = _db.from('events').select('*').eq('year', y);
                if (viewMode === 'month') { query = query.eq('month', m); }
                const { data, error } = await query;
                if (!error && data) {
                    events = data;
                    if (viewMode === 'year') { renderYear(); } else { renderCalendar(); }
                } else { console.error("数据库读取错误:", error); }
            } catch (err) { console.error("同步失败:", err); }
            await updateDisplayBg();
        }

        function getLunar(y, m, d) {
            const dateObj = new Date(y, m, d);
            const lunar = new Intl.DateTimeFormat('zh-u-ca-chinese', {day:'numeric'}).format(dateObj);
            if (lunar === '1日') return new Intl.DateTimeFormat('zh-u-ca-chinese', {month:'long'}).format(dateObj);
            const num = parseInt(lunar), units = ["", "一", "二", "三", "四", "五", "六", "七", "八", "九", "十"];
            if (num <= 10) return "初" + units[num];
            if (num < 20) return "十" + units[num % 10];
            if (num === 20) return "二十";
            if (num < 30) return "廿" + units[num % 10];
            return "三十";
        }

        async function renderCalendar() {
            const container = document.getElementById('calendar-container'); // 确保 ID 对应你的日历容器
    if (container) {
        container.innerHTML = ''; // 🚩 这一行非常关键，先把旧的擦掉再画新的
    }
            document.getElementById('dateGrid').innerHTML = '';
            document.getElementById('event-layer').innerHTML = '';

            const grid = document.getElementById('dateGrid'), layer = document.getElementById('event-layer');
            if (!grid || !layer) return;
            grid.innerHTML = ''; layer.innerHTML = '';
            
            const y = currentDate.getFullYear(), m = currentDate.getMonth();
            let currentStyle = { blur: 4, opacity: 0.5 };
            const configId = `style_${y}-${m}`;
            
            try {
                const { data } = await _db.from('configs').select('value').eq('id', configId).maybeSingle();
                if (data && data.value) {
                    currentStyle = JSON.parse(data.value);
                    let localStyles = JSON.parse(localStorage.getItem('monthStyles') || '{}');
                    localStyles[`${y}-${m}`] = currentStyle;
                    localStorage.setItem('monthStyles', JSON.stringify(localStyles));
                } else {
                    const styles = JSON.parse(localStorage.getItem('monthStyles') || '{}');
                    currentStyle = styles[`${y}-${m}`] || { blur: 4, opacity: 0.5 };
                }
            } catch (e) {
                const styles = JSON.parse(localStorage.getItem('monthStyles') || '{}');
                currentStyle = styles[`${y}-${m}`] || { blur: 4, opacity: 0.5 };
            }

            const bSlider = document.getElementById('blurRange'), oSlider = document.getElementById('bgOpacityRange');
            const blText = document.getElementById('blVal'), opText = document.getElementById('opVal');
            const finalBlur = currentStyle.blur !== undefined ? currentStyle.blur : 4;
            const finalOpacity = currentStyle.opacity !== undefined ? currentStyle.opacity : 0.5;

            if(bSlider) bSlider.value = finalBlur;
            if(blText) blText.innerText = finalBlur;
            if(oSlider) oSlider.value = finalOpacity;
            if(opText) opText.innerText = finalOpacity;
            
            const bg = document.getElementById('bg-layer');
            if(bg) { bg.style.filter = `blur(${finalBlur}px)`; bg.style.opacity = finalOpacity; }

            const displayEl = document.getElementById('monthDisplay');
            if(displayEl) displayEl.innerText = `${y}年 ${m+1}月`;

            const first = new Date(y, m, 1).getDay();
            const dInM = new Date(y, m + 1, 0).getDate();

            for (let i = 0; i < first; i++) grid.innerHTML += '<div class="empty-cell"></div>';
            let dateMap = {};
            for (let d = 1; d <= dInM; d++) {
                grid.innerHTML += `<div class="cell" onclick="handleCellClick(${d})" id="cell-${d}"><div class="date-row"><span class="s">${d}</span><span class="l">${getLunar(y,m,d)}</span></div></div>`;
                dateMap[d] = { row: Math.floor((first + d - 1) / 7) + 1, col: ((first + d - 1) % 7) + 1 };
            }
            const remaining = (7 - ((first + dInM) % 7)) % 7;
            for (let i = 0; i < remaining; i++) grid.innerHTML += '<div class="empty-cell"></div>';
            
            const monthEvents = events.filter(ev => ev.year === y && ev.month === m);
            const sortedEvents = [...monthEvents].sort((a, b) => a.start - b.start || (a.end - b.end));
            const eventSlots = {}; 
            // --- 核心修复：强制数字转换，防止 1-9日 影响 10-31日 ---
sortedEvents.forEach(ev => {
    let slot = 0;
    while (true) {
        const isOccupied = monthEvents.some(other => {
            // 将所有日期数据强转为数字再对比
            const oStart = Number(other.start), oEnd = Number(other.end);
            const eStart = Number(ev.start), eEnd = Number(ev.end);
            
            return eventSlots[other.id] === slot && !(oEnd < eStart || oStart > eEnd);
        });
        if (!isOccupied) { eventSlots[ev.id] = slot; break; }
        slot++;
    }
});
            const maxSlotsPerDay = {};
            for (let d = 1; d <= dInM; d++) {
    // 这里的 d 是数字，但 ev.start 和 ev.end 可能是字符串，必须统一
    const daySlots = monthEvents.filter(ev => d >= Number(ev.start) && d <= Number(ev.end)).map(ev => eventSlots[ev.id]);
    maxSlotsPerDay[d] = daySlots.length > 0 ? Math.max(...daySlots) + 1 : 0;
}

            monthEvents.forEach(ev => {
                if(!dateMap[ev.start] || !dateMap[ev.end]) return;
                const slot = eventSlots[ev.id];
                let maxLen = -1, bestRow = -1;
                for(let r = dateMap[ev.start].row; r <= dateMap[ev.end].row; r++){
                    const sC = (r === dateMap[ev.start].row) ? dateMap[ev.start].col : 1;
                    const eC = (r === dateMap[ev.end].row) ? dateMap[ev.end].col : 7;
                    if ((eC - sC + 1) > maxLen) { maxLen = eC - sC + 1; bestRow = r; }
                }
                
                for(let r = dateMap[ev.start].row; r <= dateMap[ev.end].row; r++){
                    const sC = (r === dateMap[ev.start].row) ? dateMap[ev.start].col : 1;
                    const eC = (r === dateMap[ev.end].row) ? dateMap[ev.end].col : 7;
                    const bar = document.createElement('div');
                    bar.className = 'event-bar';
                    bar.style.gridColumn = `${sC}/${eC+1}`;
                    bar.style.gridRow = r;
                    let colorVal = ev.barColor || ev.color || '#B2F2BB';
                    let realColor = (typeof colorVal === 'string' && colorVal.includes('|')) ? colorVal.split('|')[0] : colorVal;
                    bar.style.backgroundColor = realColor;
                    bar.style.display = 'flex';
                    bar.style.overflow = 'hidden';

                    let maxConflict = 0;
                    for (let d = ev.start; d <= ev.end; d++) maxConflict = Math.max(maxConflict, maxSlotsPerDay[d] || 0);
                    const bH = (65 / (maxConflict || 1)) - 1;
                    bar.style.height = `${bH}px`;
                    bar.style.marginTop = `${22 + slot * (bH + 1)}px`;

                    if(r === bestRow) {
                        bar.innerHTML = ev.text || ev.content || '';
                    }
                    
                    // ===============================================
                    // 【终极修复区】：不再去扫描 DOM，直接在这里绑定数据！
                    // ===============================================
                    bar.onclick = (e) => { 
                        e.stopPropagation();
                        // 1. 如果是管理员，正常调起编辑框
                        if (typeof isAdmin !== 'undefined' && isAdmin === true) {
                            openEditModal(ev.id); 
                        } 
                        // 2. 如果是访客，直接传 ev 给独立弹窗函数
                        else {
                            renderGuestDetail(ev);
                        }
                    };

                    layer.appendChild(bar);
                }
            });
            updateDisplayBg();
        }

        async function saveEvent() {
            const tEl = document.getElementById('editor-title');
            const fEl = document.getElementById('editor-field'); 
            const sVal = parseInt(document.getElementById('startDaySelect').value);
            const eVal = parseInt(document.getElementById('endDaySelect').value);

            const tTa = tEl.style.textAlign || 'left';
            const tAi = tEl.style.alignItems || 'flex-start';
            const tJc = tEl.style.justifyContent || 'flex-start';
            const tempTitle = document.createElement('div');
            tempTitle.innerHTML = tEl.innerHTML;
            tempTitle.querySelectorAll('*').forEach(el => { el.style.textAlign = 'inherit'; el.style.alignItems = 'inherit'; });
            const styledTitle = `<div style="display:flex; flex-direction:column; width:100%; height:100%; justify-content:${tJc}; align-items:${tAi}; text-align:${tTa};">${tempTitle.innerHTML}</div>`;
            
            const fTa = fEl.style.textAlign || 'left';
            const fAi = fEl.style.alignItems || 'flex-start';
            const fJc = fEl.style.justifyContent || 'flex-start';
            const tempField = document.createElement('div');
            tempField.innerHTML = fEl.innerHTML;
            tempField.querySelectorAll('*').forEach(el => { el.style.textAlign = 'inherit'; el.style.alignItems = 'inherit'; });
            const styledDetail = `<div style="display:flex; flex-direction:column; width:100%; height:100%; justify-content:${fJc}; align-items:${fAi}; text-align:${fTa};">${tempField.innerHTML}</div>`;
            
            const data = {
                text: styledTitle,      
                content: styledDetail,   
                start: Math.min(sVal, eVal),
                end: Math.max(sVal, eVal),
                year: currentDate.getFullYear(),
                month: currentDate.getMonth(),
                barColor: currentBarColor 
            };
            
            if (editingId) {
                await _db.from('events').update(data).eq('id', editingId);
            } else {
                const newId = Math.floor(Date.now() / 1000);
                await _db.from('events').insert([{ id: newId, ...data }]);
            }

            // --- 修改这里：只保留一个同步逻辑 ---
            closeModal();
            setTimeout(() => { 
                syncData(); 
            }, 200); // 稍微延迟，确保数据库已写入完成，且只执行一次
        }

        function openEditModal(id, s, e) {
            if (!isAdmin) return;
            editingId = id;

            const tEl = document.getElementById('editor-title');
            const fEl = document.getElementById('editor-field'); 
            const sS = document.getElementById('startDaySelect');
            const eS = document.getElementById('endDaySelect');
            const delBtn = document.getElementById('delBtn');

            const lastDay = new Date(currentDate.getFullYear(), currentDate.getMonth() + 1, 0).getDate();
            sS.innerHTML = eS.innerHTML = ''; 
            for(let i = 1; i <= lastDay; i++) { 
                sS.innerHTML += `<option value="${i}">${i}</option>`;
                eS.innerHTML += `<option value="${i}">${i}</option>`; 
            }
            
            if(id) {
                const ev = events.find(i => i.id == id);
                sS.value = ev.start; 
                eS.value = ev.end;

                const tempT = document.createElement('div');
                tempT.innerHTML = ev.text || "";
                const tWrapper = tempT.querySelector('div[style*="display:flex"]');
                if (tWrapper) {
                    tEl.innerHTML = tWrapper.innerHTML;
                    tEl.style.textAlign = tWrapper.style.textAlign || 'left';
                    tEl.style.justifyContent = tWrapper.style.justifyContent || 'flex-start';
                    tEl.style.alignItems = tWrapper.style.alignItems || 'flex-start';
                } else {
                    tEl.innerHTML = ev.text || "";
                    tEl.style.textAlign = 'left';
                }

                const tempF = document.createElement('div');
                tempF.innerHTML = ev.content || ""; 
                const fWrapper = tempF.querySelector('div[style*="display:flex"]');
                if (fWrapper) {
                    fEl.innerHTML = fWrapper.innerHTML;
                    fEl.style.textAlign = fWrapper.style.textAlign || 'left';
                    fEl.style.justifyContent = fWrapper.style.justifyContent || 'flex-start';
                    fEl.style.alignItems = fWrapper.style.alignItems || 'flex-start';
                } else {
                    fEl.innerHTML = ev.content || (ev.text ? "" : ""); 
                    fEl.style.textAlign = 'left';
                }

                const cVal = ev.barColor || ev.color || '#B2F2BB';
                currentBarColor = (typeof cVal === 'string') ? cVal.split('|')[0] : cVal;
                delBtn.style.display = 'block';
            } else {
                tEl.innerHTML = '';
                fEl.innerHTML = '';
                sS.value = Math.min(s, lastDay); 
                eS.value = Math.min(e, lastDay);
                currentBarColor = '#B2F2BB';
                tEl.style.textAlign = fEl.style.textAlign = 'left';
                tEl.style.justifyContent = fEl.style.justifyContent = 'flex-start';
                tEl.style.alignItems = fEl.style.alignItems = 'flex-start';
                delBtn.style.display = 'none';
            }

            document.getElementById('modal-overlay').style.display = 'block';
            document.getElementById('editor-modal').style.display = 'block';
        }

        function setStyle(e, p, v) { e.preventDefault(); const sel = window.getSelection(); if (!sel.rangeCount || sel.toString().length === 0) return; const range = sel.getRangeAt(0); const span = document.createElement('span'); span.style[p] = v; span.style.lineHeight = "1.2"; span.appendChild(range.extractContents()); range.insertNode(span); sel.removeAllRanges(); }
        function exec(e, c) {
            e.preventDefault();
            const activeEl = document.activeElement;
            if (activeEl.id !== 'editor-title' && activeEl.id !== 'editor-field') return;
            if (c !== 'justifyLeft' && c !== 'justifyCenter' && c !== 'justifyRight') { document.execCommand(c, false, null); return; }
            activeEl.style.display = 'flex'; activeEl.style.flexDirection = 'column';
            if (c === 'justifyLeft') { activeEl.style.textAlign = 'left'; activeEl.style.alignItems = 'flex-start'; } 
            else if (c === 'justifyCenter') { activeEl.style.textAlign = 'center'; activeEl.style.alignItems = 'center'; } 
            else if (c === 'justifyRight') { activeEl.style.textAlign = 'right'; activeEl.style.alignItems = 'flex-end'; }
        }

        function setAlign(e, v) { e.preventDefault(); const activeEl = document.activeElement; if (activeEl.id !== 'editor-title' && activeEl.id !== 'editor-field') return; activeEl.style.display = 'flex'; activeEl.style.flexDirection = 'column'; activeEl.style.justifyContent = v; }
        function setBarColor(c) { currentBarColor = c; }
        function changeBg(){ if(!isAdmin) return alert("请先解锁权限"); const i=document.createElement("input"); i.type="file"; i.onchange=e=>{ const r=new FileReader(); r.onload=ev=>{ const img = new Image(); img.src = ev.target.result; img.onload = async () => { const canvas = document.createElement('canvas'); const ctx = canvas.getContext('2d'); const maxW = 2000; const scale = maxW / img.width; canvas.width = maxW; canvas.height = img.height * scale; ctx.drawImage(img, 0, 0, canvas.width, canvas.height); const compressed = canvas.toDataURL('image/png'); const bgId = `bg_${currentDate.getFullYear()}_${currentDate.getMonth()}`; localStorage.setItem(bgId, compressed); await _db.from('configs').upsert([{ id: bgId, value: compressed }]); updateDisplayBg(); }; }; r.readAsDataURL(e.target.files[0]); }; i.click(); }
        async function updateDisplayBg() { const bgId = `bg_${currentDate.getFullYear()}_${currentDate.getMonth()}`; try { const { data } = await _db.from('configs').select('value').eq('id', bgId).maybeSingle(); let s = data ? data.value : localStorage.getItem(bgId); if(s){ document.getElementById('bg-layer').style.backgroundImage=`url(${s})`; document.getElementById('body-tag').classList.add('has-bg'); } else { document.getElementById('bg-layer').style.backgroundImage='none'; document.getElementById('body-tag').classList.remove('has-bg'); } } catch(e) { console.log("背景加载略过"); } }
        function exportData(){ const b=new Blob([JSON.stringify(events)],{type:'application/json'}); const a=document.createElement('a'); a.href=URL.createObjectURL(b); a.download='calendar_backup.json'; a.click(); }
        async function importData() { const i = document.createElement('input'); i.type = 'file'; i.onchange = e => { const r = new FileReader(); r.onload = async ev => { const newData = JSON.parse(ev.target.result); for (let d of newData) { const cleanData = { id: d.id, text: d.text, start: d.start, end: d.end, year: d.year, month: d.month, barColor: d.barColor || d.color }; const { error } = await _db.from('events').upsert(cleanData); if (error) console.error("这条没存上:", error.message); } alert("同步完成"); syncData(); }; r.readAsText(e.target.files[0]); }; i.click(); }
        function toggleView() { viewMode = (viewMode === 'month' ? 'year' : 'month'); document.getElementById('monthView').style.display = (viewMode === 'month' ? 'block' : 'none'); document.getElementById('yearView').style.display = (viewMode === 'year' ? 'grid' : 'none'); syncData(); }
        function renderYear() { const yv=document.getElementById('yearView'); yv.innerHTML=''; const y=currentDate.getFullYear(); document.getElementById('monthDisplay').innerText=`${y}年 全览`; for(let m=0; m<12; m++) { const card=document.createElement('div'); card.className='year-month-card'; card.onclick=()=>{currentDate.setMonth(m); viewMode='month'; document.getElementById('monthView').style.display='block'; document.getElementById('yearView').style.display='none'; syncData();}; let h=`<div style="font-size:11px;font-weight:bold">${m+1}月</div><div class="ym-grid">`; const first=new Date(y,m,1).getDay(), dInM=new Date(y,m+1,0).getDate(); for(let i=0; i<first; i++) h+='<div class="ym-day"></div>'; for(let d=1; d<=dInM; d++) { const has=events.some(ev=>ev.year===y && ev.month===m && d>=ev.start && d<=ev.end); h+=`<div class="ym-day">${d}${has?'<div class="dot-mark"></div>':''}</div>`; } card.innerHTML=h+'</div>'; yv.appendChild(card); } }
        function handleCellClick(d) { if(!isAdmin) return; if (selection.length === 0) { selection.push(d); document.getElementById(`cell-${d}`).classList.add('selected'); } else { openEditModal(null, Math.min(selection[0], d), Math.max(selection[0], d)); } }
        function closeModal() { document.getElementById('modal-overlay').style.display='none'; document.getElementById('editor-modal').style.display='none'; selection=[]; document.querySelectorAll('.cell').forEach(c=>c.classList.remove('selected')); }
        async function deleteEvent() { if(confirm("删除？")) { await _db.from('events').delete().eq('id', editingId); closeModal(); syncData(); } }
        function changeMonth(o) { currentDate.setMonth(currentDate.getMonth()+o); syncData(); }

        let tempTitleStyle = { color: '#2d3748', fontSize: '18px' };
        let currentLogoBase64 = null; 
        function imgCompress(file, maxW, callback) { const r = new FileReader(); r.onload = ev => { const img = new Image(); img.src = ev.target.result; img.onload = () => { const canvas = document.createElement('canvas'); const ctx = canvas.getContext('2d'); if(img.width <= maxW) { callback(ev.target.result); return; } const scale = maxW / img.width; canvas.width = maxW; canvas.height = img.height * scale; ctx.drawImage(img, 0, 0, canvas.width, canvas.height); callback(canvas.toDataURL('image/png')); }; }; r.readAsDataURL(file); }
        function triggerLogoUpload() { if(!isAdmin) return alert("请先解锁"); const i = document.createElement("input"); i.type = "file"; i.accept = "image/*"; i.onchange = e => { const file = e.target.files[0]; if(!file) return; imgCompress(file, 400, (compressed) => { currentLogoBase64 = compressed; const p = document.getElementById('logoEditPreview'); if(p) { p.src = compressed; p.style.display = 'block'; } document.getElementById('logoUploadText').innerText = "点击更换 LOGO"; document.getElementById('delLogoBtn').style.display = 'block'; }); }; i.click(); }
        function deleteLogo() { currentLogoBase64 = null; document.getElementById('logoEditPreview').style.display = 'none'; document.getElementById('logoUploadText').innerText = "点击上传 LOGO 图片"; document.getElementById('delLogoBtn').style.display = 'none'; }
        function openNameModal() { if(!isAdmin) return alert("请点击底部©解锁权限"); const display = document.getElementById('calendarNameDisplay'); const input = document.getElementById('nameEditInput'); const logoDisplay = document.getElementById('calendarLogoDisplay'); input.value = (display.innerText === "双击设置日历名称") ? "" : display.innerText; input.style.color = display.style.color || '#2d3748'; input.style.fontSize = display.style.fontSize || '18px'; if(logoDisplay && logoDisplay.style.display === 'inline-block') { document.getElementById('logoEditPreview').src = logoDisplay.src; document.getElementById('logoEditPreview').style.display = 'block'; document.getElementById('logoUploadText').innerText = "点击更换 LOGO"; document.getElementById('delLogoBtn').style.display = 'block'; currentLogoBase64 = logoDisplay.src; } else { deleteLogo(); } document.getElementById('modal-overlay').style.display = 'block'; document.getElementById('name-modal').style.display = 'block'; }
        function closeNameModal() { document.getElementById('modal-overlay').style.display = 'none'; document.getElementById('name-modal').style.display = 'none'; }
        function setTitleStyle(prop, val) { const input = document.getElementById('nameEditInput'); if(input) input.style[prop] = val; tempTitleStyle[prop] = val; }
        async function dbSaveCalendarName() { const text = document.getElementById('nameEditInput').value || "双击设置日历名称"; const fullData = { text: text, color: tempTitleStyle.color, fontSize: tempTitleStyle.fontSize, logo: currentLogoBase64 }; try { const { error } = await _db.from('configs').upsert([{ id: 'global_calendar_name', value: JSON.stringify(fullData) }]); if (error) throw error; localStorage.setItem('customCalendarNameData', JSON.stringify(fullData)); closeNameModal(); location.reload(); } catch (err) { alert("云端保存失败"); } }
        async function dbLoadCalendarName() { const display = document.getElementById('calendarNameDisplay'); const logoDisplay = document.getElementById('calendarLogoDisplay'); const applyData = (dataStr) => { if(!dataStr) return; try { const d = JSON.parse(dataStr); if(typeof d === 'object' && d !== null) { display.innerText = d.text || "双击设置日历名称"; display.style.color = d.color || '#2d3748'; display.style.fontSize = d.fontSize || '18px'; tempTitleStyle = { color: d.color, fontSize: d.fontSize }; if(d.logo && logoDisplay) { logoDisplay.src = d.logo; logoDisplay.style.display = 'inline-block'; } } else { display.innerText = dataStr; } } catch(e) { display.innerText = dataStr; } }; const local = localStorage.getItem('customCalendarNameData'); if (local) applyData(local); try { const { data, error } = await _db.from('configs').select('value').eq('id', 'global_calendar_name').maybeSingle(); if (!error && data && data.value) { applyData(data.value); localStorage.setItem('customCalendarNameData', data.value); } } catch (err) { console.log("标题加载完成"); } }

        async function initApp() { await dbLoadCalendarName(); await syncData(); }
        initApp();

        // ==========================================
        // 【绝对核心】独立的访客详情弹窗逻辑
        // ==========================================
        window.renderGuestDetail = function(ev) {
            const modal = document.getElementById('noteDetailModal');
            const contentBox = document.getElementById('noteDetailContent');
            if (!modal || !contentBox || !ev) return;

            // 1. 处理日期格式
            const s = parseInt(ev.start), e = parseInt(ev.end);
            const m = (ev.month !== undefined) ? (parseInt(ev.month) + 1) : "";
            const y = ev.year || "";
            const dateStr = (s === e) ? `${m}月${s}日` : `${m}月${s}日至${e}日`;

            // 2. 提取真正的内容
            const hasContent = ev.content && ev.content !== "null" && ev.content.trim().length > 0;
            const finalContent = hasContent ? ev.content : '<span style="color:#bbb; font-style:italic;">( 暂无详细内容 )</span>';

            // 3. 渲染数据
            contentBox.innerHTML = `
                <div style="font-size: 13px; color: #888; margin-bottom: 12px; text-align:center;">
                    📅 ${y}年 ${dateStr}
                </div>
                <div style="padding-bottom: 15px; margin-bottom: 15px; border-bottom: 1px dashed rgba(0,0,0,0.1); width:100%; font-weight:bold;">
                    ${ev.text || '无标题'}
                </div>
                <div class="note-detail-body" style="text-align: left; width: 100%; min-height: 80px; line-height: 1.6;">
                    ${finalContent}
                </div>
            `;
            
            modal.style.display = 'block';
        };

        window.closeNoteModal = function() {
            const m = document.getElementById('noteDetailModal');
            if (m) m.style.display = 'none';
        };
    </script>
